<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wave — Войти</title>
  <link rel="stylesheet" href="shared.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-dot"></div>Wave
    </div>
    <div class="auth-title">Добро пожаловать</div>
    <div class="auth-sub">Войдите, чтобы продолжить слушать музыку</div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      <div class="form-error" id="errMsg"></div>
    </div>

    <button class="btn-primary" id="loginBtn">Войти</button>

    <div class="auth-footer">
      Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
  // Если уже залогинен — на главную
  if (API.isLoggedIn()) window.location.href = '/index.html';

  const emailEl = document.getElementById('email');
  const passEl  = document.getElementById('password');
  const btn     = document.getElementById('loginBtn');
  const err     = document.getElementById('errMsg');

  const doLogin = async () => {
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Входим...';
    try {
      const data = await API.auth.login(emailEl.value, passEl.value);
      API.auth.save(data);
      window.location.href = '/index.html';
    } catch (e) {
      err.textContent = e.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Войти';
    }
  };

  btn.addEventListener('click', doLogin);
  passEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
