<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wave — Админ</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card,
    .panel,
    .gate-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
    }
    .stat-card {
      padding: 16px;
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .admin-sections {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 18px;
    }
    .panel {
      padding: 16px;
    }
    .panel + .panel {
      margin-top: 18px;
    }
    .panel-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .admin-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .admin-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 10px 0;
      border-top: 0.5px solid var(--border);
    }
    .admin-row:first-child {
      border-top: none;
      padding-top: 0;
    }
    .admin-main {
      min-width: 0;
    }
    .admin-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .admin-sub {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .admin-meta {
      font-size: 11px;
      color: var(--text-3);
      text-align: right;
      white-space: nowrap;
    }
    .admin-empty {
      color: var(--text-3);
      font-size: 13px;
      padding: 10px 0;
    }
    .gate-wrap {
      max-width: 420px;
      margin: 48px auto 0;
    }
    .gate-card {
      padding: 22px;
    }
    .gate-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .gate-sub {
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 18px;
    }
    .gate-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .gate-btn {
      flex: 1;
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .gate-btn.primary {
      background: var(--text);
      color: #fff;
    }
    .gate-btn.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 0.5px solid var(--border);
    }
    @media (max-width: 1100px) {
      .admin-grid { grid-template-columns: repeat(2, 1fr); }
      .admin-sections { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .admin-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <main class="main">
    <div class="topbar">
      <div class="page-title">Админ-панель</div>
    </div>

    <div id="adminContent">
      <div class="skeleton" style="height:120px;border-radius:12px;margin-bottom:18px"></div>
      <div class="skeleton" style="height:320px;border-radius:12px"></div>
    </div>
  </main>
</div>

<script src="api.js"></script>
<script src="shared.js"></script>
<script>
function statCard(label, value) {
  return `
    <div class="stat-card">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${value}</div>
    </div>`;
}

function renderRows(items, renderer) {
  if (!items.length) return '<div class="admin-empty">Пока пусто</div>';
  return `<div class="admin-list">${items.map(renderer).join('')}</div>`;
}

function renderPasswordGate(message = '') {
  const content = document.getElementById('adminContent');
  content.innerHTML = `
    <div class="gate-wrap">
      <div class="gate-card">
        <div class="gate-title">Пароль админ-панели</div>
        <div class="gate-sub">Введите пароль для доступа к статистике и управлению.</div>
        <div class="form-group">
          <label class="form-label">Пароль</label>
          <input class="form-input" id="adminPasswordInput" type="password" placeholder="Введите пароль"/>
        </div>
        ${message ? `<div style="margin-top:10px;color:#c85656;font-size:12px">${message}</div>` : ''}
        <div class="gate-actions">
          <button class="gate-btn secondary" id="adminPasswordClear">Сбросить</button>
          <button class="gate-btn primary" id="adminPasswordSave">Открыть</button>
        </div>
      </div>
    </div>`;

  document.getElementById('adminPasswordSave').addEventListener('click', async () => {
    const password = document.getElementById('adminPasswordInput').value.trim();
    if (!password) {
      showToast('Введите пароль');
      return;
    }
    API.admin.savePassword(password);
    await loadAdmin();
  });

  document.getElementById('adminPasswordClear').addEventListener('click', () => {
    API.admin.clearPassword();
    document.getElementById('adminPasswordInput').value = '';
  });
}

function renderAdmin(summary, users, playlists, tracks) {
  const content = document.getElementById('adminContent');
  content.innerHTML = `
    <div class="admin-grid">
      ${statCard('Пользователи', summary.users_count ?? 0)}
      ${statCard('Треки', summary.tracks_count ?? 0)}
      ${statCard('Альбомы', summary.albums_count ?? 0)}
      ${statCard('Исполнители', summary.artists_count ?? 0)}
      ${statCard('Плейлисты', summary.playlists_count ?? 0)}
      ${statCard('Прослушивания', summary.plays_count ?? 0)}
    </div>

    <div class="admin-sections">
      <div>
        <section class="panel">
          <div class="panel-title">Последние пользователи</div>
          ${renderRows(users, (user) => `
            <div class="admin-row">
              <div class="admin-main">
                <div class="admin-name">${user.username}</div>
                <div class="admin-sub">${user.email}</div>
              </div>
              <div class="admin-meta">${user.playlists_count} пл.<br>${user.plays_count} просл.</div>
            </div>`)}
        </section>

        <section class="panel">
          <div class="panel-title">Последние плейлисты</div>
          ${renderRows(playlists, (playlist) => `
            <div class="admin-row">
              <div class="admin-main">
                <div class="admin-name">${playlist.playlist_name}</div>
                <div class="admin-sub">${playlist.username}</div>
              </div>
              <div class="admin-meta">${playlist.tracks_count} треков</div>
            </div>`)}
        </section>
      </div>

      <section class="panel">
        <div class="panel-title">Последние треки в базе</div>
        ${renderRows(tracks, (track) => `
          <div class="admin-row">
            <div class="admin-main">
              <div class="admin-name">${track.track_title}</div>
              <div class="admin-sub">${track.artist_name || '—'}${track.album_title ? ' · ' + track.album_title : ''}</div>
            </div>
            <div class="admin-meta">${track.duration ? Math.floor(track.duration / 60) + ':' + String(track.duration % 60).padStart(2, '0') : '—'}</div>
          </div>`)}
      </section>
    </div>`;
}

async function loadAdmin() {
  const content = document.getElementById('adminContent');

  if (!API.isLoggedIn()) {
    content.innerHTML = `
      <div class="empty-state">
        <p>Сначала войдите в аккаунт</p>
      </div>`;
    return;
  }

  if (!API.admin.getPassword()) {
    renderPasswordGate();
    return;
  }

  try {
    const [summaryData, usersData, playlistsData, tracksData] = await Promise.all([
      API.admin.summary(),
      API.admin.users(12),
      API.admin.playlists(12),
      API.admin.tracks(16),
    ]);

    renderAdmin(
      summaryData.summary || {},
      usersData.users || [],
      playlistsData.playlists || [],
      tracksData.tracks || []
    );
  } catch (error) {
    if (/парол/i.test(error.message || '')) {
      API.admin.clearPassword();
      renderPasswordGate(error.message);
      return;
    }

    content.innerHTML = `
      <div class="empty-state">
        <p>${error.message || 'Не удалось открыть админ-панель'}</p>
      </div>`;
  }
}

loadAdmin();
</script>
</body>
</html>
