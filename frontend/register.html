<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wave — Регистрация</title>
  <link rel="stylesheet" href="shared.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-dot"></div>Wave
    </div>
    <div class="auth-title">Создать аккаунт</div>
    <div class="auth-sub">Бесплатно. Навсегда.</div>

    <div class="form-group">
      <label class="form-label">Имя пользователя</label>
      <input class="form-input" type="text" id="username" placeholder="alex_music"/>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input class="form-input" type="password" id="password" placeholder="Минимум 6 символов"/>
      <div class="form-error" id="errMsg"></div>
    </div>

    <button class="btn-primary" id="regBtn">Создать аккаунт</button>

    <div class="auth-footer">
      Уже есть аккаунт? <a href="login.html">Войти</a>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
  if (API.isLoggedIn()) window.location.href = '/index.html';

  const usernameEl = document.getElementById('username');
  const emailEl    = document.getElementById('email');
  const passEl     = document.getElementById('password');
  const btn        = document.getElementById('regBtn');
  const err        = document.getElementById('errMsg');

  btn.addEventListener('click', async () => {
    err.classList.remove('show');
    if (passEl.value.length < 6) {
      err.textContent = 'Пароль должен быть не менее 6 символов';
      err.classList.add('show');
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Создаём...';
    try {
      const data = await API.auth.register(usernameEl.value, emailEl.value, passEl.value);
      API.auth.save(data);
      window.location.href = '/index.html';
    } catch (e) {
      err.textContent = e.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Создать аккаунт';
    }
  });
</script>
</body>
</html>
