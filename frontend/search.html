<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wave — Поиск</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .search-wrap {
      position: relative; margin-bottom: 32px;
    }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-3); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 12px 14px 12px 42px;
      border: 0.5px solid var(--border-mid); border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      background: var(--surface); color: var(--text);
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    .search-input::placeholder { color: var(--text-3); }

    .tabs { display: flex; gap: 6px; margin-bottom: 24px; }
    .tab {
      padding: 7px 16px; border-radius: 20px; font-size: 13px;
      font-weight: 500; cursor: pointer; border: 0.5px solid var(--border-mid);
      background: var(--surface); color: var(--text-2);
      transition: background .15s, color .15s, border-color .15s;
    }
    .tab.active { background: var(--text); color: #fff; border-color: var(--text); }
    .tab:hover:not(.active) { background: var(--surface2); }

    /* Результаты треков */
    .results-tracks { display: flex; flex-direction: column; gap: 2px; }
    .result-row {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 10px; border-radius: 10px; cursor: pointer;
      transition: background .12s;
    }
    .result-row:hover { background: var(--surface); }
    .result-thumb {
      width: 44px; height: 44px; border-radius: 8px;
      flex-shrink: 0; object-fit: cover; overflow: hidden;
    }
    .result-thumb-div { width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0; }
    .result-info { flex: 1; min-width: 0; }
    .result-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-sub  { font-size: 11px; color: var(--text-2); margin-top: 2px; }
    .result-dur  { font-size: 12px; color: var(--text-3); flex-shrink: 0; }
    .result-play {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: var(--accent-light); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s; flex-shrink: 0;
    }
    .result-row:hover .result-play { opacity: 1; }

    /* Результаты альбомов/исполнителей */
    .results-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
    .result-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: border-color .15s, transform .15s;
    }
    .result-card:hover { border-color: var(--border-mid); transform: translateY(-2px); }
    .result-card-thumb { width: 100%; aspect-ratio: 1; overflow: hidden; }
    .result-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .result-card-body { padding: 10px 12px 12px; }
    .result-card-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-card-sub  { font-size: 11px; color: var(--text-2); }

    /* Начальный экран */
    .search-hint { text-align: center; padding: 60px 0; color: var(--text-3); }
    .search-hint svg { opacity: .3; margin-bottom: 12px; }
    .search-hint p { font-size: 14px; }

    .results-count { font-size: 12px; color: var(--text-3); margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="app" id="app">
  <main class="main">
    <div class="topbar">
      <div class="page-title">Поиск</div>
    </div>

    <!-- Поисковая строка -->
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3">
          <circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14" stroke-linecap="round"/>
        </svg>
      </span>
      <input class="search-input" id="searchInput" type="text"
        placeholder="Треки, исполнители, альбомы..." autocomplete="off"/>
    </div>

    <!-- Табы -->
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="tracks">Треки</div>
      <div class="tab" data-tab="albums">Альбомы</div>
      <div class="tab" data-tab="artists">Исполнители</div>
    </div>

    <!-- Контент -->
    <div id="resultsWrap">
      <div class="search-hint">
        <svg width="40" height="40" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1">
          <circle cx="7" cy="7" r="5"/><path d="M11 11L15 15" stroke-linecap="round"/>
        </svg>
        <p>Введите запрос для поиска музыки</p>
      </div>
    </div>
  </main>
</div>

<script src="api.js"></script>
<script src="shared.js"></script>
<script>
const GRADIENTS = [
  'linear-gradient(135deg,#CECBF6,#7F77DD)',
  'linear-gradient(135deg,#9FE1CB,#1D9E75)',
  'linear-gradient(135deg,#F5C4B3,#D85A30)',
  'linear-gradient(135deg,#FAC775,#BA7517)',
  'linear-gradient(135deg,#F5C0D4,#D4537E)',
  'linear-gradient(135deg,#C5E8AF,#639922)',
];

const fmt = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

let activeTab = 'tracks';
let lastQuery = '';
let debounceTimer;

// ── Табы ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    if (lastQuery) doSearch(lastQuery);
  });
});

// ── Поиск ──
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(debounceTimer);
  const q = e.target.value.trim();
  if (!q) {
    document.getElementById('resultsWrap').innerHTML = `
      <div class="search-hint">
        <svg width="40" height="40" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1">
          <circle cx="7" cy="7" r="5"/><path d="M11 11L15 15" stroke-linecap="round"/>
        </svg>
        <p>Введите запрос для поиска музыки</p>
      </div>`;
    return;
  }
  debounceTimer = setTimeout(() => doSearch(q), 400);
});

async function doSearch(q) {
  lastQuery = q;
  const wrap = document.getElementById('resultsWrap');
  wrap.innerHTML = '<div class="skeleton" style="height:200px;border-radius:12px"></div>';

  try {
    if (activeTab === 'tracks') {
      // Сначала ищем в нашей БД
      const local = await API.tracks.search(q);
      let tracks = local.tracks || [];

      // Если мало результатов — допрашиваем Jamendo
      if (tracks.length < 5) {
        const jam = await API.jamendo.search(q, 'tracks');
        const jamTracks = (jam.results || []).map(t => ({
          jamendo_id: String(t.id),
          track_id:    null,
          track_title: t.name,
          title:       t.name,
          artist_name: t.artist_name,
          artist_jamendo_id: String(t.artist_id),
          album_title: t.album_name,
          album_jamendo_id: String(t.album_id),
          album_cover: t.album_image || t.image,
          album_release: t.releasedate || null,
          duration:    t.duration,
          audio_url:   t.audio,
          cover_url:   t.image,
          artist_image: t.artist_image || null,
        }));
        tracks = [...tracks, ...jamTracks];
      }

      renderTracks(tracks, q);
    } else if (activeTab === 'albums') {
      const data = await API.jamendo.search(q, 'albums');
      renderAlbums(data.results || []);
    } else {
      const data = await API.jamendo.search(q, 'artists');
      renderArtists(data.results || []);
    }
  } catch (e) {
    wrap.innerHTML = `<div class="empty-state"><p>Ошибка поиска: ${e.message}</p></div>`;
  }
}

function renderTracks(tracks, q) {
  const wrap = document.getElementById('resultsWrap');
  if (!tracks.length) {
    wrap.innerHTML = `<div class="empty-state"><p>Ничего не найдено по запросу «${q}»</p></div>`;
    return;
  }
  wrap.innerHTML = `
    <div class="results-count">${tracks.length} результатов</div>
    <div class="results-tracks">
      ${tracks.map((t, i) => `
        <div class="result-row" onclick="playTrack(${i})">
          ${t.cover_url
            ? `<img class="result-thumb" src="${t.cover_url}" alt="">`
            : `<div class="result-thumb-div" style="background:${GRADIENTS[i%GRADIENTS.length]}"></div>`}
        <div class="result-info">
          <div class="result-name">${t.track_title || t.title}</div>
          <div class="result-sub">${t.artist_name || '—'} ${t.album_title ? '· ' + t.album_title : ''}</div>
        </div>
        <span class="result-dur">${t.duration ? fmt(t.duration) : '—'}</span>
        <button class="icon-btn" onclick="addToFavorites(${JSON.stringify(t).replace(/"/g,'&quot;')}, event)">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M8 13.5S1.5 9.5 1.5 5.5a3.5 3.5 0 0 1 6.5-1.8A3.5 3.5 0 0 1 14.5 5.5c0 4-6.5 8-6.5 8z"/>
          </svg>
        </button>
        <button class="result-play">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 3l10 5-10 5V3z"/></svg>
        </button>
      </div>`).join('')}
    </div>`;

  window._searchTracks = tracks;
}

function renderAlbums(albums) {
  const wrap = document.getElementById('resultsWrap');
  if (!albums.length) { wrap.innerHTML = `<div class="empty-state"><p>Альбомы не найдены</p></div>`; return; }
  wrap.innerHTML = `
    <div class="results-count">${albums.length} альбомов</div>
    <div class="results-grid">
      ${albums.map((a, i) => `
        <div class="result-card">
          <div class="result-card-thumb">
            ${a.image
              ? `<img src="${a.image}" alt="">`
              : `<div style="width:100%;height:100%;background:${GRADIENTS[i%GRADIENTS.length]}"></div>`}
          </div>
          <div class="result-card-body">
            <div class="result-card-name">${a.name}</div>
            <div class="result-card-sub">${a.artist_name || '—'}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function renderArtists(artists) {
  const wrap = document.getElementById('resultsWrap');
  if (!artists.length) { wrap.innerHTML = `<div class="empty-state"><p>Исполнители не найдены</p></div>`; return; }
  wrap.innerHTML = `
    <div class="results-count">${artists.length} исполнителей</div>
    <div class="results-grid">
      ${artists.map((a, i) => `
        <div class="result-card">
          <div class="result-card-thumb">
            ${a.image
              ? `<img src="${a.image}" alt="" style="border-radius:50%">`
              : `<div style="width:100%;height:100%;background:${GRADIENTS[i%GRADIENTS.length]}"></div>`}
          </div>
          <div class="result-card-body">
            <div class="result-card-name">${a.name}</div>
            <div class="result-card-sub">Исполнитель</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function playTrack(idx) {
  const tracks = window._searchTracks || [];
  if (!tracks[idx]) return;
  Player.setQueue(tracks, idx);
}
</script>
</body>
</html>
