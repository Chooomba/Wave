<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wave - Обзор</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .genres-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 36px;
    }
    .genre-card {
      border-radius: 14px; padding: 22px 20px;
      cursor: pointer; position: relative; overflow: hidden;
      min-height: 100px; display: flex; align-items: flex-end;
      transition: transform .15s;
    }
    .genre-card:hover { transform: translateY(-2px); }
    .genre-card::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(0,0,0,0.15);
    }
    .genre-name {
      font-size: 16px; font-weight: 500; color: #fff;
      position: relative; z-index: 1; letter-spacing: -0.2px;
    }
    .genre-icon {
      position: absolute; right: 16px; top: 16px; z-index: 1;
      font-size: 28px; opacity: .7;
    }

    .tracks-section { margin-bottom: 36px; }
    .tracks-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .back-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 0.5px solid var(--border-mid); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-2); transition: background .15s;
    }
    .back-btn:hover { background: var(--surface2); }
    .genre-badge {
      padding: 4px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 500; color: #fff;
    }

    .track-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px;
    }
    .track-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      transition: background .12s;
    }
    .track-item:hover { background: var(--surface); }
    .track-item-thumb {
      width: 44px; height: 44px; border-radius: 8px;
      flex-shrink: 0; object-fit: cover;
    }
    .track-item-info { flex: 1; min-width: 0; }
    .track-item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-item-artist { font-size: 11px; color: var(--text-2); margin-top: 2px; }
    .track-item-play {
      width: 30px; height: 30px; border-radius: 50%; border: none;
      background: var(--accent-light); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s; flex-shrink: 0;
    }
    .track-item:hover .track-item-play { opacity: 1; }

    .load-more {
      width: 100%; padding: 12px; background: var(--surface);
      border: 0.5px solid var(--border-mid); border-radius: 10px;
      font-size: 13px; color: var(--text-2); cursor: pointer;
      transition: background .15s; margin-top: 16px;
      font-family: 'DM Sans', sans-serif;
    }
    .load-more:hover { background: var(--surface2); }
  </style>
</head>
<body>
<div class="app" id="app">
  <main class="main">
    <div class="topbar">
      <div class="page-title">Обзор</div>
    </div>

    <div id="genresView">
      <section>
        <div class="section-header">
          <div class="section-title">Жанры</div>
        </div>
        <div class="genres-grid" id="genresGrid"></div>
      </section>

      <section>
        <div class="section-header">
          <div class="section-title">Все треки</div>
          <span class="see-all" id="loadMoreAll">Загрузить еще</span>
        </div>
        <div class="track-grid" id="allTracksGrid"></div>
      </section>
    </div>

    <div id="genreView" style="display:none">
      <div class="tracks-header">
        <div class="back-btn" id="backBtn">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M10 3L5 8l5 5"/>
          </svg>
        </div>
        <div class="section-title" id="genreTitle">-</div>
        <div class="genre-badge" id="genreBadge"></div>
      </div>
      <div class="track-grid" id="genreTracksGrid"></div>
      <button class="load-more" id="loadMoreGenre">Загрузить еще</button>
    </div>
  </main>
</div>

<script src="api.js"></script>
<script src="shared.js"></script>
<script>
const GENRES = [
  { tag: 'ambient',    label: 'Ambient',      bg: 'linear-gradient(135deg,#CECBF6,#3C3489)', emoji: '🌊' },
  { tag: 'electronic', label: 'Electronic',   bg: 'linear-gradient(135deg,#9FE1CB,#085041)', emoji: '⚡' },
  { tag: 'folk',       label: 'Folk',         bg: 'linear-gradient(135deg,#FAC775,#412402)', emoji: '🎸' },
  { tag: 'jazz',       label: 'Jazz',         bg: 'linear-gradient(135deg,#F5C0D4,#4A1020)', emoji: '🎷' },
  { tag: 'classical',  label: 'Классика',     bg: 'linear-gradient(135deg,#E8DFD0,#8B7355)', emoji: '🎻' },
  { tag: 'pop',        label: 'Pop',          bg: 'linear-gradient(135deg,#FBEAF0,#D4537E)', emoji: '🎵' },
  { tag: 'rock',       label: 'Rock',         bg: 'linear-gradient(135deg,#F5C4B3,#4A1B0C)', emoji: '🎤' },
  { tag: 'soundtrack', label: 'Саундтреки',   bg: 'linear-gradient(135deg,#C5E8AF,#1E3A08)', emoji: '🎬' },
  { tag: 'lounge',     label: 'Lounge',       bg: 'linear-gradient(135deg,#D4E8F5,#2A5A7A)', emoji: '🍹' },
];

let allOffset = 0;
let genreOffset = 0;
let currentGenre = null;
let allTracks = [];
let genreTracks = [];

function toJamendoTrack(t) {
  return {
    jamendo_id: String(t.id),
    track_id: null,
    track_title: t.name,
    title: t.name,
    artist_name: t.artist_name,
    artist_jamendo_id: String(t.artist_id),
    album_title: t.album_name,
    album_jamendo_id: String(t.album_id),
    album_cover: t.album_image || t.image,
    album_release: t.releasedate || null,
    duration: t.duration,
    audio_url: t.audio,
    cover_url: t.image,
    artist_image: t.artist_image || null,
  };
}

document.getElementById('genresGrid').innerHTML = GENRES.map(g => `
  <div class="genre-card" style="background:${g.bg}" onclick='openGenre(${JSON.stringify(g.tag)}, ${JSON.stringify(g.label)}, ${JSON.stringify(g.bg)})'>
    <span class="genre-icon">${g.emoji}</span>
    <span class="genre-name">${g.label}</span>
  </div>`).join('');

const trackItem = (t, idx, list) => `
  <div class="track-item" onclick="playFrom(${idx}, '${list}')" onmouseenter="preloadFrom(${idx}, '${list}')">
    ${t.cover_url
      ? `<img class="track-item-thumb" src="${t.cover_url}" alt="">`
      : `<div class="track-item-thumb" style="background:linear-gradient(135deg,#CECBF6,#7F77DD)"></div>`}
    <div class="track-item-info">
      <div class="track-item-name">${t.track_title || t.title}</div>
      <div class="track-item-artist">${t.artist_name || '-'}</div>
    </div>
    <button class="icon-btn" onclick="addToFavorites(${JSON.stringify(t).replace(/"/g,'&quot;')}, event)">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M8 13.5S1.5 9.5 1.5 5.5a3.5 3.5 0 0 1 6.5-1.8A3.5 3.5 0 0 1 14.5 5.5c0 4-6.5 8-6.5 8z"/>
      </svg>
    </button>
    <button class="track-item-play">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M4 3l10 5-10 5V3z"/></svg>
    </button>
  </div>`;

async function loadAllTracks() {
  const data = await API.tracks.list(20, allOffset);
  const tracks = (data.tracks || []).filter(t => t.audio_url);
  allTracks = [...allTracks, ...tracks];
  const g = document.getElementById('allTracksGrid');
  g.innerHTML = allTracks.map((t, i) => trackItem(t, i, 'all')).join('');
  allOffset += tracks.length;
}

async function loadGenreTracks(tag) {
  const data = await API.jamendo.tracks({ limit: 20, genre: tag, offset: genreOffset, audioformat: 'mp32' });
  const raw = data.tracks || [];
  const tracks = raw.map(toJamendoTrack);
  genreTracks = [...genreTracks, ...tracks];
  const g = document.getElementById('genreTracksGrid');
  g.innerHTML = genreTracks.map((t, i) => trackItem(t, i, 'genre')).join('');
  genreOffset += tracks.length;
}

async function openGenre(tag, label, bg) {
  currentGenre = tag;
  genreOffset = 0;
  genreTracks = [];
  document.getElementById('genresView').style.display = 'none';
  document.getElementById('genreView').style.display = 'block';
  document.getElementById('genreTitle').textContent = label;
  document.getElementById('genreBadge').textContent = label;
  document.getElementById('genreBadge').style.background = bg.split(',')[0].replace('linear-gradient(135deg', '').replace('(', '');
  document.getElementById('genreTracksGrid').innerHTML =
    '<div class="skeleton" style="height:200px;border-radius:12px;grid-column:span 2"></div>';
  await loadGenreTracks(tag);
}

document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('genreView').style.display = 'none';
  document.getElementById('genresView').style.display = 'block';
});

document.getElementById('loadMoreAll').addEventListener('click', loadAllTracks);
document.getElementById('loadMoreGenre').addEventListener('click', () => loadGenreTracks(currentGenre));

function playFrom(idx, list) {
  const tracks = list === 'all' ? allTracks : genreTracks;
  Player.setQueue(tracks, idx);
}

function preloadFrom(idx, list) {
  const tracks = list === 'all' ? allTracks : genreTracks;
  if (!tracks[idx]) return;
  Player.preload(tracks[idx]);
}

loadAllTracks();
</script>
</body>
</html>
